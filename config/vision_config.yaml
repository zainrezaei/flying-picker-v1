# ============================================================
# Flying Picker — Vision System Configuration
# ============================================================

# --- Input source ---
input:
  video_path: "public/IMG_6256.MOV"   # path relative to project root
  #video_path: "1"
# --- Preprocessing ---
preprocess:
  blur_kernel_size: 5        # Gaussian blur kernel (must be odd)
  threshold_value: 150       # Binary threshold (0-255); light object on dark bg
  threshold_max: 250         # Max value for binary threshold

# --- Detection ---
detection:
  min_contour_area: 500     # Ignore contours smaller than this (pixels²)
  max_contour_area: 200000   # Ignore contours larger than this (pixels²); 0 = no limit
  min_solidity: 0.60         # Min contour-area / convex-hull-area ratio (0–1); 0 = disabled
  min_aspect_ratio: 0.3      # Min width/height of rotated bbox; 0 = disabled
  max_aspect_ratio: 10.0      # Max width/height of rotated bbox; 0 = disabled
  min_confidence: 0.50       # Reject detections below this confidence (0–1)
  edge_margin: 10            # Reject objects within this many px of frame edge (partial entry)

# --- Region of Interest (crop frame edges to remove noise) ---
roi:
  enabled: true
  x_start: 0.0            # Left edge crop (0.0 = no crop, 0.1 = crop 10%)
  y_start: 0.21         # Top edge crop
  x_end: 1.0             # Right edge (1.0 = full width)
  y_end: 0.8              # Bottom edge (< 1.0 crops bottom noise)

# --- Shape Classification (Hu Moment matching) ---
classification:
  enabled: true
  reference_dir: "."              # directory containing Part_*.jpg / Part_*.png
  match_threshold: 0.20           # max matchShapes score to accept (lower = stricter)
  method: 1                       # cv2.matchShapes method (1 = CONTOURS_MATCH_I2)
  ref_thresh_value: 160           # binary threshold for reference images

# --- Calibration (checkerboard) ---
# Used by run_camera_calibration.py. Pipeline auto-loads the result file.
calibration:
  board_cols: 9              # Inner corners (columns) of checkerboard
  board_rows: 6              # Inner corners (rows) of checkerboard
  square_size_mm: 25.0       # Physical size of one square in mm
  result_file: "config/camera_calibration.json"   # Auto-loaded by pipeline

  # --- Physical measurements (fill in once measured on-site) ---
  belt_width_mm: 0.0                 # (#1) Conveyor belt width in mm
  camera_height_mm: 0.0              # (#3) Camera lens height above belt surface in mm
  camera_offset_x_mm: -17            # (#4) Camera X offset from robot origin in mm
  camera_offset_y_mm: 10            # (#4) Camera Y offset from robot origin in mm
  expected_object_width_mm: 0.0       # (#5) Expected object width for sanity check (mm)
  expected_object_height_mm: 0.0      # (#5) Expected object height for sanity check (mm)
  object_size_tolerance_pct: 25.0     # (#5) Acceptable size deviation (%) before warning

# --- Homography (pixel → world mm) ---
# Used by run_homography_calibration.py. Pipeline auto-loads the result file.
homography:
  result_file: "config/homography.json"            # Auto-loaded by pipeline

# --- Belt / Conveyor ---
# Enable belt compensation to predict pick position ahead of detection.
belt:
  enabled: false             # Set true once belt speed is measured
  speed_mm_s: 0.0            # Belt linear speed in mm/s
  detection_to_pick_delay_s: 0.0   # Time from detection to robot pick (seconds)
  direction: "x"             # Belt motion axis: "x" (left-right) or "y" (up-down)

# --- Detection Tracking (single-send with debounce) ---
# Prevents duplicate coordinate sends for the same part.
tracking:
  confirm_frames: 3          # Consecutive detections before sending (filters jitter)
  exit_frames: 5             # Consecutive no-detections before resetting (absorbs dropouts)
  distance_threshold_mm: 10  # Distance jump (mm) to consider a "new part"

# --- Display ---
display:
  show_windows: true         # Show live OpenCV windows
  show_mask: true           # Show the binary mask window (useful for debugging/tuning)
  overlay_color: [0, 255, 0] # Bounding box color (BGR — green)
  centroid_color: [0, 0, 255] # Centroid dot color (BGR — red)
  text_color: [0, 255, 0] # Text color (BGR — white)
  centroid_radius: 6
  box_thickness: 2
  font_scale: 0.6
